name: build-and-release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      VERSION_CODE: ${{ github.run_number }}
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: install gomobile
        run: go install golang.org/x/mobile/cmd/gomobile@latest

      - name: build gomobile backend
        run: |
          mkdir -p app/libs
          cd backend
          gomobile init
          cd backend
          gomobile bind -androidapi 26 -target android -o ../../app/libs/backend.aar

      - name: decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "${ANDROID_KEYSTORE_PATH}"

      - name: build release APK
        run: ./gradlew assembleRelease

      - name: create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
